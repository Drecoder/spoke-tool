version: '3.8'

# Mixed Language Project - Docker Compose Configuration
# This configuration demonstrates a multi-service architecture with:
# - Go backend API
# - Node.js frontend
# - Python data processor
# - PostgreSQL database
# - Redis cache
# - Nginx reverse proxy

services:
  # Go Backend API Service
  go-api:
    build:
      context: ./go-server
      dockerfile: Dockerfile
      target: development
      args:
        - GO_VERSION=1.21
        - APP_VERSION=${APP_VERSION:-1.0.0}
    container_name: go-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-app_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - API_TIMEOUT=30s
    env_file:
      - ./go-server/.env
    volumes:
      - ./go-server:/app
      - go-modules:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Node.js Frontend Service
  node-frontend:
    build:
      context: ./web-client
      dockerfile: Dockerfile
      target: development
      args:
        - NODE_VERSION=20
        - NPM_VERSION=10
    container_name: node-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_URL=http://go-api:8080
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./web-client/.env
    volumes:
      - ./web-client:/app
      - /app/node_modules
    depends_on:
      go-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode !== 200)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Python Data Processor Service
  python-processor:
    build:
      context: ./scripts
      dockerfile: Dockerfile
      target: development
      args:
        - PYTHON_VERSION=3.11
    container_name: python-processor
    restart: unless-stopped
    environment:
      - PYTHON_ENV=${PYTHON_ENV:-development}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-app_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PROCESSOR_INTERVAL=60
      - LOG_LEVEL=INFO
    env_file:
      - ./scripts/.env
    volumes:
      - ./scripts:/app
      - python-packages:/usr/local/lib/python3.11/site-packages
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; exit(0) if requests.get('http://localhost:8000/health').status_code == 200 else exit(1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-app_db}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
      - ./postgres/backups:/backups
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - go-api
      - node-frontend
      - python-processor
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M

  # Adminer (Database Management)
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    networks:
      - backend
    profiles:
      - tools
      - dev

  # Redis Commander (Redis Management)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      - redis
    networks:
      - backend
    profiles:
      - tools
      - dev

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - backend
      - frontend
    profiles:
      - monitoring
      - prod

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - backend
    profiles:
      - monitoring
      - prod

  # Jaeger Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # UI
      - "14250:14250"  # gRPC
      - "14268:14268"  # HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend
    profiles:
      - tracing
      - dev

  # Elasticsearch for Logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - backend
    profiles:
      - logging
      - prod

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - backend
    profiles:
      - logging
      - prod

  # Filebeat for Log Collection
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: filebeat
    restart: unless-stopped
    user: root
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - elasticsearch
    networks:
      - backend
    profiles:
      - logging
      - prod

  # Backup Service
  backup:
    image: alpine:latest
    container_name: backup
    restart: "no"
    volumes:
      - postgres-data:/data/postgres:ro
      - ./backups:/backups
    entrypoint: |
      sh -c "
      apk add --no-cache postgresql-client
      while true; do
        PGPASSWORD=${DB_PASSWORD:-postgres} pg_dump -h postgres -U ${DB_USER:-postgres} -d ${DB_NAME:-app_db} > /backups/backup-\$$(date +%Y%m%d-%H%M%S).sql
        sleep 86400
      done
      "
    depends_on:
      - postgres
    networks:
      - backend
    profiles:
      - backup

  # Test Service (for running integration tests)
  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: test-runner
    environment:
      - GO_API_URL=http://go-api:8080
      - NODE_URL=http://node-frontend:3000
      - PYTHON_URL=http://python-processor:8000
      - DB_HOST=postgres
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-app_db}_test
    volumes:
      - ./test-results:/app/test-results
      - ./coverage:/app/coverage
    depends_on:
      go-api:
        condition: service_healthy
      node-frontend:
        condition: service_healthy
      python-processor:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend
      - frontend
    profiles:
      - test
      - ci

# Volumes for persistent data
volumes:
  postgres-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/postgres
      o: bind
  redis-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/redis
      o: bind
  go-modules:
    driver: local
  python-packages:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  elasticsearch-data:
    driver: local

# Networks for service isolation
networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  backend:
    driver: bridge
    internal: true  # Isolated from outside
    ipam:
      config:
        - subnet: 172.20.1.0/24

# Docker Compose extensions
x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"
  driver: json-file

# Apply default logging to all services
services:
  go-api:
    logging: *default-logging
  node-frontend:
    logging: *default-logging
  python-processor:
    logging: *default-logging
  postgres:
    logging: *default-logging
  redis:
    logging: *default-logging
  nginx:
    logging: *default-logging