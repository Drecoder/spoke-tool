      - "com.mixed-project.volume=go-data"
      - "com.mixed-project.type=data"

  go-logs:
    driver: local
    driver_opts:
      type: none
      device: ./logs/go
      o: bind

  node-cache:
    driver: local
    driver_opts:
      type: none
      device: ./cache/node
      o: bind

  node-logs:
    driver: local
    driver_opts:
      type: none
      device: ./logs/node
      o: bind

  python-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/python
      o: bind

  python-logs:
    driver: local
    driver_opts:
      type: none
      device: ./logs/python
      o: bind

  python-models:
    driver: local
    driver_opts:
      type: none
      device: ./models
      o: bind

  # Databases
  postgres-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/postgres
      o: bind

  postgres-backups:
    driver: local
    driver_opts:
      type: none
      device: ./backups/postgres
      o: bind

  redis-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/redis
      o: bind

  rabbitmq-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/rabbitmq
      o: bind

  # Monitoring
  prometheus-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/prometheus
      o: bind

  grafana-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/grafana
      o: bind

  elasticsearch-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/elasticsearch
      o: bind

  jaeger-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/jaeger
      o: bind

  traefik-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/traefik
      o: bind

  # Storage
  minio-data:
    driver: local
    driver_opts:
      type: none
      device: ./data/minio
      o: bind

# ============================================================================
# Docker Compose Extensions
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-deploy: &default-deploy
  resources:
    limits:
      cpus: '0.5'
      memory: 512M
    reservations:
      cpus: '0.25'
      memory: 256M
  restart_policy:
    condition: any
    delay: 5s
    max_attempts: 3
    window: 120s

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

# Apply default logging to all services
services:
  go-api:
    logging: *default-logging
  node-frontend:
    logging: *default-logging
  python-processor:
    logging: *default-logging
  postgres:
    logging: *default-logging
  redis:
    logging: *default-logging
  rabbitmq:
    logging: *default-logging
  elasticsearch:
    logging: *default-logging
  kibana:
    logging: *default-logging
  logstash:
    logging: *default-logging
  prometheus:
    logging: *default-logging
  grafana:
    logging: *default-logging
  jaeger:
    logging: *default-logging
  traefik:
    logging: *default-logging
  nginx:
    logging: *default-logging
  adminer:
    logging: *default-logging
  redis-commander:
    logging: *default-logging
  rabbitmq-management:
    logging: *default-logging
  backup:
    logging: *default-logging
  mailhog:
    logging: *default-logging
  minio:
    logging: *default-logging
  test:
    logging: *default-logging